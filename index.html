<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANKH V6 PRO: THE UNSTOPPABLE</title>
    <style>
        :root { --bg: #020202; --card: #0d0d0d; --accent: #00d4ff; --up: #00ff88; --down: #ff4444; --border: #1a1a1a; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        header { background: #080808; border-bottom: 1px solid #222; padding: 10px 25px; display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; }
        .search-wrap { display: flex; gap: 8px; justify-content: center; }
        input { background: #151515; border: 1px solid #333; color: white; padding: 8px; border-radius: 4px; width: 250px; outline: none; }
        button { background: var(--accent); color: black; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        main { display: grid; grid-template-columns: 320px 1fr 320px; gap: 12px; padding: 12px; flex: 1; overflow: hidden; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow-y: auto; }
        .ticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .ticker-card { background: #121212; border: 1px solid #222; padding: 10px; border-radius: 6px; cursor: pointer; transition: 0.1s; }
        .sym { font-size: 0.85rem; font-weight: 800; color: var(--accent); }
        .price { font-size: 1.2rem; font-family: monospace; font-weight: bold; margin: 4px 0; color: #fff; }
        .up { color: var(--up); } .down { color: var(--down); }
        .ticker-bar { background: #080808; border-top: 1px solid #222; padding: 8px; white-space: nowrap; overflow: hidden; }
        .ticker-text { display: inline-block; animation: scroll 50s linear infinite; font-family: monospace; font-size: 0.8rem; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

<header>
    <div><h1>ANKH <span style="color:var(--accent)">V6 PRO</span></h1></div>
    <div class="search-wrap">
        <input type="text" id="sInput" placeholder="Symbol (AAPL, NVDA...)">
        <button onclick="refresh()">FORCE DATA RELOAD</button>
    </div>
    <div id="clock" style="text-align: right; font-family: monospace;">00:00:00</div>
</header>

<main>
    <div class="panel">
        <h4 style="color:#555; font-size:0.6rem;">AI SENTIMENT ENGINE</h4>
        <div id="p-sym" style="color:var(--accent); font-weight:bold;">READY</div>
        <div id="p-score" style="font-size:2rem; font-weight:900;">--%</div>
    </div>
    <div class="panel">
        <h4 style="color:#555; font-size:0.6rem;">MISSION WATCHLIST</h4>
        <div class="ticker-grid" id="watchlist-container"></div>
    </div>
    <div class="panel">
        <h4 style="color:#555; font-size:0.6rem;">NEWS INTEL</h4>
        <div id="news-feed" style="font-size:0.7rem;">Loading...</div>
    </div>
</main>

<div class="ticker-bar">
    <div class="ticker-text">S&P 500: 5,204.34 | NASDAQ: 16,332.22 | BTC: $69,420 | GOLD: $2,329.10 | OIL: $86.91</div>
</div>

<script>
    const API_KEY = 'cot4gfhr01qgmopn3vag';
    let watchlist = ['AG','ATAI','APLE','BBD','BSBR','CIG','DVYA','DVYE','ELP','EQIX','F','HL','ITUB','KGC','LB','MAIN','NGD','NMG','PBR','PFF','PHO','REGI','SAN','SLG','TU','VEU','VNQ','WRN','XOM','XLE'];

    async function init() {
        render();
        await refresh();
        setInterval(updateClock, 1000);
    }

    function render() {
        document.getElementById('watchlist-container').innerHTML = watchlist.map(s => {
            const id = s.replace(/[^a-z0-9]/gi, '_');
            return `<div class="ticker-card" onclick="analyze('${s}')">
                <div class="sym">${s}</div>
                <div class="price" id="prc-${id}">LOADING...</div>
                <div id="chg-${id}" style="font-size:0.7rem;">--</div>
            </div>`;
        }).join('');
    }

    async function refresh() {
        console.log("Starting Data Injection...");
        for (let s of watchlist) {
            const id = s.replace(/[^a-z0-9]/gi, '_');
            try {
                // ADDED CACHE BUSTING TO FORCE DATA THROUGH
                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${s}&token=${API_KEY}&cb=${Math.random()}`);
                const data = await response.json();
                
                // CRITICAL FIX: If market is closed, 'c' is 0. We MUST show 'pc' (Prev Close)
                const finalPrice = data.c !== 0 ? data.c : data.pc;
                
                if (finalPrice) {
                    document.getElementById(`prc-${id}`).innerText = finalPrice.toFixed(2);
                    const diff = (finalPrice - data.pc).toFixed(2);
                    const pct = data.dp ? data.dp.toFixed(2) : "0.00";
                    document.getElementById(`chg-${id}`).innerText = `$${diff} (${pct}%)`;
                    document.getElementById(`chg-${id}`).className = diff >= 0 ? 'up' : 'down';
                }
            } catch (err) {
                console.error("Fetch error for " + s, err);
            }
        }
    }

    async function analyze(s) {
        document.getElementById('p-sym').innerText = `SCANNING ${s}...`;
        const res = await fetch(`https://finnhub.io/api/v1/stock/recommendation?symbol=${s}&token=${API_KEY}`).then(r => r.json());
        if (res && res.length > 0) {
            const l = res[0];
            const score = (((l.strongBuy + l.buy) / (l.strongBuy + l.buy + l.hold + l.sell + l.strongSell)) * 100).toFixed(1);
            document.getElementById('p-score').innerText = score + "%";
        }
    }

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }

    window.onload = init;
</script>
</body>
</html>
